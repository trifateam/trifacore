name: Laravel CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Laravel Test And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline, ldap, msgpack, igbinary, redis, swoole, memcached, pcov, xdebug
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm install

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Check code syntax and style (Pint)
        run: vendor/bin/pint --test

      - name: Build Frontend Assets
        run: npm run build

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test --no-ansi
