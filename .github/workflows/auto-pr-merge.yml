name: Auto PR and Merge

on:
  push:
    branches-ignore:
      - main

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR, Merge, and Delete Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Memeriksa apakah Pull Request sudah ada untuk branch ${GITHUB_REF_NAME}..."
          PR_EXISTS=$(gh pr list --head ${GITHUB_REF_NAME} --base main --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq "0" ]; then
            echo "Membuat Pull Request..."
            gh pr create -B main -H ${GITHUB_REF_NAME} --title "Auto PR: ${GITHUB_REF_NAME}" --body "Pull request ini dibuat dan di-merge secara otomatis oleh GitHub Actions." || echo "Gagal membuat PR, mungkin tidak ada perubahan."
          else
            echo "Pull Request sudah ada."
          fi

          echo "Mengambil branch main dari remote agar gh pr merge tidak error saat cleanup..."
          git fetch origin main:main || true

          echo "Melakukan Merge Pull Request dan Menghapus Branch..."
          # Karena GitHub butuh beberapa detik untuk mengecek konflik (mergeability), kita gunakan sistem retry
          MERGE_SUCCESS=false
          for i in {1..5}; do
            echo "Mencoba merge (Percobaan $i)..."
            if gh pr merge ${GITHUB_REF_NAME} --squash --delete-branch; then
              echo "✅ Pull Request berhasil di-merge!"
              MERGE_SUCCESS=true
              break
            fi
            echo "Belum bisa di-merge (Mungkin GitHub sedang mengecek konflik). Menunggu 5 detik..."
            sleep 5
          done

          if [ "$MERGE_SUCCESS" = false ]; then
            echo "❌ Pull Request GAGAL di-merge setelah 5x percobaan."
            exit 1
          fi
