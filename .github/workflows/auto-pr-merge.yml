name: Auto PR and Merge

on:
  push:
    branches-ignore:
      - main

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR, Merge, and Delete Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Memeriksa apakah Pull Request sudah ada untuk branch ${GITHUB_REF_NAME}..."
          PR_EXISTS=$(gh pr list --head ${GITHUB_REF_NAME} --base main --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq "0" ]; then
            echo "Membuat Pull Request..."
            gh pr create -B main -H ${GITHUB_REF_NAME} --title "Auto PR: ${GITHUB_REF_NAME}" --body "Pull request ini dibuat dan di-merge secara otomatis oleh GitHub Actions." || echo "Gagal membuat PR, mungkin tidak ada perubahan."
          else
            echo "Pull Request sudah ada."
          fi

          echo "Menunggu 5 detik agar GitHub memproses status Pull Request..."
          sleep 5

          echo "Melakukan Merge Pull Request dan Menghapus Branch..."
          # Jalankan merge. Jika gagal (misal karena local git error), kita abaikan dulu
          gh pr merge ${GITHUB_REF_NAME} --squash --delete-branch || true
          
          # Verifikasi apakah benar-benar sudah ter-merge di server GitHub
          PR_STATE=$(gh pr view ${GITHUB_REF_NAME} --json state --jq '.state' || echo "UNKNOWN")
          
          if [ "$PR_STATE" == "MERGED" ]; then
             echo "✅ Pull Request BERHASIL di-merge di server (mengabaikan error Git lokal)."
             exit 0
          else
             echo "❌ Pull Request GAGAL di-merge. Status saat ini: $PR_STATE"
             exit 1
          fi
